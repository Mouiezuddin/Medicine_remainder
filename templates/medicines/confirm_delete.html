{% extends 'base.html' %}
{% block title %}Delete Medicine{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto py-20">
    <div class="prism-glass p-12 rounded-[40px] text-center border-white/5 relative overflow-hidden shadow-2xl">
        <div class="absolute inset-0 rainbow-refraction opacity-10 pointer-events-none"></div>
        
        <div class="relative z-10 space-y-8">
            <div class="w-20 h-20 rounded-2xl bg-error/10 flex items-center justify-center text-error mx-auto mb-6 animate-bounce">
                <span class="material-symbols-outlined text-5xl">inventory_2</span>
            </div>
            
            <div class="space-y-2">
                <h2 class="font-headline-xl text-3xl text-white">Purge Medicine?</h2>
                <p class="text-on-surface-variant font-body-md max-w-sm mx-auto">
                    Removing <span class="text-white font-bold">{{ medicine.name }}</span> will also delete all associated pulse reminders. This action is permanent.
                </p>
            </div>

            <div class="pt-6">
                <form method="post" class="flex flex-col md:flex-row gap-4 justify-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger py-4 px-12 rounded-2xl font-headline-md text-sm uppercase tracking-widest shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">delete_sweep</span> Purge Cabinet
                    </button>
                    <a href="{% url 'medicine_list' %}" class="btn btn-ghost py-4 px-10 rounded-2xl font-label-md uppercase tracking-widest text-on-surface-variant hover:text-white transition-all text-center">
                        Keep Medicine
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
